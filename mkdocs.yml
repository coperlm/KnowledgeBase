site_name: Coperlm的芝士库🧀
site_url: https://coperlm.github.io/KnowledgeBase/
site_description: Knowledge Base of @coperlm
repo_url: https://coperlm.github.io/
repo_name: 博客

# exclude_docs: |
#   Z-未整理/

plugins:
  - search
  - tags:
      tags_file: KnowledgeBase/tags.md

theme:
  font:
    text: Roboto
    code: Roboto Mono
  name: material
  language: zh
  palette:
    # - primary: indigo
    # - accent: amber

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-4
        name: 切换到深色模式

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-7
        name: 切换到浅色模式
    
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - header.autohide
    - navigation.footer

  # logo: images/cheese.gif
  # favicon: images/note.gif

  icon:
    repo: fontawesome/solid/blog
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right

# 指定字体（微软雅黑 + time new roma）
extra_css:
  - assets/stylesheets/extra.css

# 如果注释掉，则用默认目录排序
# nav:
#   - Home: index.md
#   - About: about.md

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdnjs.cloudflare.com/ajax/libs/wavedrom/3.1.0/skins/default.js
  - https://cdnjs.cloudflare.com/ajax/libs/wavedrom/3.1.0/wavedrom.min.js
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - assets/javascripts/tablesort.js
  - assets/javascripts/kb-tree.js

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

